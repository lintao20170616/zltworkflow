<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Error</title>
    <style>
      .error {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .error img {
        margin-bottom: 20px;
      }
      .error .msg {
        margin-bottom: 20px;
        color: #788fa5;
        font-size: 16px;
      }
      .error .btn {
        display: inline-block;
        text-decoration: none;
        color: #fff;
        background-color: #2c46b6;
        font-size: 12px;
        height: 32px;
        line-height: 32px;
        padding: 0 16px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="error">
      <img class="pic-404__parent" src="./common_icon.png" alt="404" />
      <div class="msg">Error</div>
      <a class="btn">Back to login</a>
    </div>

    <script>
      function getQuery() {
        const search = window.location.search.substring(1);
        const query = search.split('&').reduce((prev, cur) => {
          const [key, value] = cur.split('=');
          prev[key] = decodeURIComponent(value);
          return prev;
        }, {});
        return query;
      }

      function startCounter(btn, redirectUrl, num = 3, text = 'Back to login') {
        btn.innerHTML = `${text} (${num})`;
        if (num === 0) {
          document.location.href = redirectUrl;
          return;
        }
        setTimeout(function () {
          startCounter(btn, redirectUrl, num - 1, text);
        }, 1000);
      }

      (function () {
        const query = getQuery();
        const msg = query['msg'] || 'Get user info failed, please try again.';
        const redirectUrl = query['redirectUrl'] || '/api/logout';
        const msgElem = document.querySelector('.msg');
        const btnElem = document.querySelector('.btn');
        msgElem.innerHTML = msg;
        btnElem.href = redirectUrl;
        startCounter(btnElem, redirectUrl);
      })();
    </script>
  </body>
</html>
